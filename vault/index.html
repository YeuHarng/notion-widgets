<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Vault</title>
</head>
<body>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #15161A;
    --panel: #1D1F24;
    --card: #24262C;
    --card-hover: #2B2E35;
    --line: #33353C;
    --text: #ECECEC;
    --text-dim: #9A9CA5;
    --text-faint: #6C6E76;
    --brass: #D4A94E;
    --brass-dim: #9C8348;
    --teal: #5AACA4;
    --danger: #D97757;
    --radius: 10px;
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root{ min-height: 100vh; display:flex; flex-direction:column; }

  /* ---------- Lock / setup screens ---------- */
  .gate{
    flex:1; display:flex; align-items:center; justify-content:center;
    padding: 40px 20px;
  }
  .gate-card{
    width: 100%; max-width: 380px;
    text-align:center;
  }
  .dial{
    width:96px; height:96px; margin:0 auto 28px;
    border-radius:50%;
    border: 2px solid var(--line);
    position:relative;
    display:flex; align-items:center; justify-content:center;
    background: radial-gradient(circle at 35% 30%, #2A2C33, #1B1C21 70%);
  }
  .dial::before{
    content:'';
    position:absolute; inset:-2px;
    border-radius:50%;
    border: 1px dashed var(--brass-dim);
    opacity:0.5;
    animation: spin 30s linear infinite;
  }
  .dial-ticks{ position:absolute; inset:0; }
  .dial-ticks span{
    position:absolute; width:2px; height:8px; background:var(--brass-dim);
    left:50%; top:2px; transform-origin: 1px 46px;
  }
  @keyframes spin{ to{ transform: rotate(360deg);} }
  .dial svg{ width:34px; height:34px; stroke:var(--brass); position:relative; z-index:1; }

  .gate h1{
    font-family: var(--font-display);
    font-size: 26px; font-weight:600; letter-spacing:-0.01em;
    margin-bottom:8px;
  }
  .gate p.sub{
    color:var(--text-dim); font-size:13.5px; line-height:1.6; margin-bottom:28px;
  }
  .field{ text-align:left; margin-bottom:14px; }
  .field label{
    display:block; font-size:12px; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px;
    font-weight:600;
  }
  input[type=password], input[type=text]{
    width:100%; background:var(--panel); border:1px solid var(--line);
    color:var(--text); padding:11px 13px; border-radius:8px;
    font-family: var(--font-mono); font-size:14px;
    outline:none; transition: border-color .15s;
  }
  input[type=password]:focus, input[type=text]:focus{ border-color: var(--brass-dim); }
  .btn{
    width:100%; padding:12px; border-radius:8px; border:none;
    font-family:var(--font-body); font-weight:600; font-size:14px;
    cursor:pointer; transition: transform .1s, filter .15s;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--brass); color:#1B1500; }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-ghost{ background:transparent; color:var(--text-dim); border:1px solid var(--line); }
  .btn-ghost:hover{ background:var(--panel); }
  .btn-danger{ background:var(--danger); color:#2A0E00; }
  .err{
    color: var(--danger); font-size:13px; margin-bottom:14px; min-height:16px;
    text-align:left;
  }
  .gate-note{
    margin-top:22px; font-size:11.5px; color:var(--text-faint); line-height:1.6;
    border-top:1px solid var(--line); padding-top:16px;
  }

  /* ---------- Main vault ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px; border-bottom:1px solid var(--line);
    background: var(--panel);
    position:sticky; top:0; z-index:5;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{
    width:9px; height:9px; border-radius:50%; background:var(--teal);
    box-shadow: 0 0 8px var(--teal);
  }
  .brand h1{ font-family:var(--font-display); font-size:19px; font-weight:600; }
  .brand span{ font-size:11px; color:var(--text-faint); font-family:var(--font-mono); }
  .topbar-actions{ display:flex; gap:10px; }
  .icon-btn{
    background:var(--card); border:1px solid var(--line); color:var(--text-dim);
    padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500;
    cursor:pointer; display:flex; align-items:center; gap:6px;
    font-family:var(--font-body); transition: all .15s;
  }
  .icon-btn:hover{ background:var(--card-hover); color:var(--text); }
  .icon-btn.primary{ background:var(--brass); color:#1B1500; border:none; font-weight:600; }
  .icon-btn.primary:hover{ filter:brightness(1.08); }

  .content{ flex:1; padding: 28px; max-width:1200px; margin:0 auto; width:100%; }
  .empty{
    text-align:center; padding: 80px 20px; color:var(--text-faint);
  }
  .empty h2{ font-family:var(--font-display); color:var(--text-dim); font-size:20px; margin-bottom:8px; }

  .group{ margin-bottom: 34px; }
  .group-head{
    display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  .group-head .ring{
    width:16px; height:16px; border-radius:50%; border:2px solid var(--brass-dim);
  }
  .group-head h2{ font-size:15px; font-weight:600; }
  .group-head .count{
    font-size:12px; color:var(--text-faint); font-family:var(--font-mono);
    background:var(--panel); padding:2px 8px; border-radius:20px;
  }
  .add-inline{
    margin-left:auto; font-size:12px; color:var(--text-faint); cursor:pointer;
    padding:4px 10px; border-radius:6px; border:1px solid transparent;
  }
  .add-inline:hover{ border-color:var(--line); color:var(--text-dim); }

  .grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap:12px;
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px; transition: background .15s, border-color .15s;
    position:relative;
  }
  .card:hover{ background:var(--card-hover); border-color:#3D404A; }
  .card-head{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .card-icon{
    width:30px; height:30px; border-radius:7px; display:flex; align-items:center;
    justify-content:center; font-size:15px; flex-shrink:0;
  }
  .card-title{ font-size:14px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-menu{ color:var(--text-faint); cursor:pointer; padding:2px 4px; border-radius:4px; font-size:16px; line-height:1;}
  .card-menu:hover{ background:var(--panel); color:var(--text); }
  .card-row{
    display:flex; align-items:center; justify-content:space-between;
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);
    background:var(--panel); border-radius:6px; padding:6px 9px; margin-bottom:6px;
  }
  .card-row:last-child{ margin-bottom:0; }
  .card-row .val{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .card-row .acts{ display:flex; gap:4px; margin-left:8px; flex-shrink:0; }
  .mini-btn{
    background:transparent; border:none; color:var(--text-faint); cursor:pointer;
    padding:2px 4px; font-size:12px; border-radius:4px;
  }
  .mini-btn:hover{ color:var(--brass); background:#2E2A1A; }
  .tag{
    display:inline-block; font-size:10.5px; padding:2px 8px; border-radius:20px;
    margin-top:8px; font-weight:600; letter-spacing:0.01em;
  }

  .fab-menu{ position:relative; }
  .dropdown{
    position:absolute; top:26px; right:0; background:var(--panel); border:1px solid var(--line);
    border-radius:8px; min-width:120px; z-index:10; overflow:hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .dropdown div{ padding:9px 12px; font-size:12.5px; cursor:pointer; color:var(--text-dim); }
  .dropdown div:hover{ background:var(--card-hover); color:var(--text); }
  .dropdown div.danger{ color:var(--danger); }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,10,12,0.65); backdrop-filter: blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:100%; max-width:420px; padding:26px; max-height:88vh; overflow-y:auto;
  }
  .modal h3{ font-family:var(--font-display); font-size:19px; margin-bottom:18px; }
  .row-2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .pw-input-wrap{ position:relative; }
  .pw-input-wrap input{ padding-right:76px; }
  .pw-input-wrap .pw-acts{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    display:flex; gap:2px;
  }
  .modal-actions{ display:flex; gap:10px; margin-top:20px; }
  .color-picker{ display:flex; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .icon-list{ gap:4px; max-height:118px; overflow-y:auto; padding:2px; }
  .icon-list .mini-btn{ width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; }
  .icon-list .mini-btn img, .card-icon img{ width:18px; height:18px; border-radius:4px; display:block; }
  .icon-selected{ background:var(--card-hover); outline:1px solid var(--brass-dim); }
  .sync-p{ font-size:12.5px; color:var(--text-dim); line-height:1.55; margin-bottom:10px; }
  .sync-p b{ color:var(--text); }
  .modal textarea{
    width:100%; background:var(--panel); border:1px solid var(--line);
    color:var(--text); padding:9px 11px; border-radius:8px;
    font-family:var(--font-mono); font-size:11px; line-height:1.4;
    outline:none; resize:none; word-break:break-all;
  }
  .sync-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; vertical-align:1px; }
  .sync-dot.ok{ background:var(--teal); }
  .sync-dot.bad{ background:var(--danger); }
  .color-dot{
    width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  }
  .color-dot.active{ border-color:var(--text); }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--brass); color:#1B1500; padding:10px 18px; border-radius:8px;
    font-size:13px; font-weight:600; z-index:100; opacity:0; pointer-events:none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  @media (max-width:480px){
    .content{ padding:16px; }
    .topbar{ padding:14px 16px; }
    .row-2{ grid-template-columns:1fr; }
  }
</style>

<div id="root"></div>

<div class="toast" id="toast"></div>

<script>
/* Spaces: ?space=work gives an isolated vault (own storage keys, own sync gist).
   No param = the default/personal vault, unchanged. */
const SPACE = (new URLSearchParams(location.search).get('space') || '').trim();
const DATA_KEY = SPACE ? 'vault-data-' + SPACE : 'vault-data';
const SYNC_KEY = SPACE ? 'vault-sync-' + SPACE : 'vault-sync';

const ICONS = ['📷','📘','🎵','🎮','✉️','☁️','💬','🔒','💼','🎬','🛒','🏦','💻','📁','⭐'];

/* Brand icons: stored as 'd:<domain>', rendered via Google's favicon service */
const BRANDS = [
  {name:'Gmail', domain:'gmail.com'},
  {name:'Google', domain:'google.com'},
  {name:'Instagram', domain:'instagram.com'},
  {name:'Facebook', domain:'facebook.com'},
  {name:'X (Twitter)', domain:'x.com'},
  {name:'TikTok', domain:'tiktok.com'},
  {name:'YouTube', domain:'youtube.com'},
  {name:'WhatsApp', domain:'whatsapp.com'},
  {name:'Telegram', domain:'telegram.org'},
  {name:'WeChat', domain:'wechat.com'},
  {name:'Discord', domain:'discord.com'},
  {name:'Reddit', domain:'reddit.com'},
  {name:'LinkedIn', domain:'linkedin.com'},
  {name:'GitHub', domain:'github.com'},
  {name:'Microsoft', domain:'microsoft.com'},
  {name:'Apple', domain:'apple.com'},
  {name:'Netflix', domain:'netflix.com'},
  {name:'Spotify', domain:'spotify.com'},
  {name:'Steam', domain:'steampowered.com'},
  {name:'PayPal', domain:'paypal.com'},
  {name:'Amazon', domain:'amazon.com'},
  {name:'Shopee', domain:'shopee.com.my'},
  {name:'Lazada', domain:'lazada.com.my'},
  {name:'Grab', domain:'grab.com'},
  {name:"Touch 'n Go", domain:'tngdigital.com.my'},
  {name:'Maybank', domain:'maybank2u.com.my'},
  {name:'CIMB', domain:'cimb.com.my'},
  {name:'Binance', domain:'binance.com'},
  {name:'Notion', domain:'notion.so'},
  {name:'Canva', domain:'canva.com'},
  {name:'ChatGPT', domain:'chatgpt.com'},
  {name:'Claude', domain:'claude.ai'},
  {name:'TradingView', domain:'tradingview.com'},
];

function renderIcon(icon){
  if(icon && icon.startsWith('d:')){
    return `<img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(icon.slice(2))}&sz=64" alt="">`;
  }
  return escapeHtml(icon || '⭐');
}
const COLORS = [
  {bg:'#2E2416', fg:'#D4A94E'}, // brass
  {bg:'#1E2B2A', fg:'#5AACA4'}, // teal
  {bg:'#2C1E1E', fg:'#D97757'}, // clay
  {bg:'#1E2530', fg:'#7A9CD4'}, // blue
  {bg:'#241E30', fg:'#A184D9'}, // violet
  {bg:'#232323', fg:'#9A9CA5'}, // grey
];

let state = {
  vault: { entries: [] },
  openModal: null,   // null | {mode:'add'|'edit', entry:{...}}
  openMenuId: null,
  revealed: {},       // entryId -> bool
  sync: null,        // null | {token, key, gistId}
  syncStatus: null,  // null | 'ok' | 'error'
  openSync: false,
  syncBusy: false,
  syncError: '',
};

function render(){
  const root = document.getElementById('root');
  root.innerHTML = mainScreen();
  bindMainEvents();
}

/* ---------------- Storage (localStorage-backed) ---------------- */
window.storage = {
  async get(key){ const value = localStorage.getItem(key); return value === null ? null : { key, value }; },
  async set(key, value){ localStorage.setItem(key, value); return { key, value }; },
};

/* ---------------- Device sync via private GitHub Gist ----------------
   Data is AES-256-GCM encrypted with a random key before it leaves the
   browser; the sync code (token + key + gist id) is what other devices
   paste once to join. */
const SYNC_FILE = 'vault.json';

function b64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function unb64(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }

function loadSyncCfg(){ try{ return JSON.parse(localStorage.getItem(SYNC_KEY) || 'null'); }catch(e){ return null; } }
function saveSyncCfg(cfg){ localStorage.setItem(SYNC_KEY, JSON.stringify(cfg)); }
function syncCode(cfg){ return 'VSYNC1.' + btoa(JSON.stringify(cfg)); }
function parseSyncCode(s){
  if(!s.startsWith('VSYNC1.')) return null;
  try{
    const cfg = JSON.parse(atob(s.slice(7)));
    return (cfg && cfg.token && cfg.key && cfg.gistId) ? cfg : null;
  }catch(e){ return null; }
}

async function importKeyB64(keyB64){
  return crypto.subtle.importKey('raw', unb64(keyB64), 'AES-GCM', false, ['encrypt','decrypt']);
}
async function encryptJson(obj, keyB64){
  const key = await importKeyB64(keyB64);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return JSON.stringify({ iv: b64(iv), data: b64(ct) });
}
async function decryptJson(str, keyB64){
  const blob = JSON.parse(str);
  const key = await importKeyB64(keyB64);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv: unb64(blob.iv)}, key, unb64(blob.data));
  return JSON.parse(new TextDecoder().decode(plain));
}

async function gistApi(method, path, cfg, body){
  const res = await fetch('https://api.github.com' + path, {
    method,
    headers: {
      'Authorization': 'Bearer ' + cfg.token,
      'Accept': 'application/vnd.github+json',
      ...(body ? {'Content-Type':'application/json'} : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if(!res.ok) throw new Error('GitHub API ' + res.status);
  return res.json();
}

async function pullFromGist(){
  const cfg = state.sync;
  const gist = await gistApi('GET', '/gists/' + cfg.gistId, cfg);
  state.vault = await decryptJson(gist.files[SYNC_FILE].content, cfg.key);
  await window.storage.set(DATA_KEY, JSON.stringify(state.vault), false);
}

async function pushToGist(){
  const cfg = state.sync;
  const content = await encryptJson(state.vault, cfg.key);
  await gistApi('PATCH', '/gists/' + cfg.gistId, cfg, { files: { [SYNC_FILE]: { content } } });
}

async function connectSync(input){
  const code = parseSyncCode(input);
  if(code){
    // joining from another device: adopt the shared vault, keep any local-only entries
    state.sync = code;
    const localEntries = state.vault.entries;
    await pullFromGist();
    const extra = localEntries.filter(l => !state.vault.entries.some(g => g.id === l.id));
    if(extra.length){
      state.vault.entries = state.vault.entries.concat(extra);
      await pushToGist();
      await window.storage.set(DATA_KEY, JSON.stringify(state.vault), false);
    }
    saveSyncCfg(code);
    return;
  }
  // first device: treat input as a GitHub token, create the gist
  const cfg = { token: input, key: b64(crypto.getRandomValues(new Uint8Array(32))), gistId: null };
  const content = await encryptJson(state.vault, cfg.key);
  const gist = await gistApi('POST', '/gists', cfg, {
    description: 'Account Vault sync (notion-widgets)' + (SPACE ? ' — ' + SPACE : ''),
    public: false,
    files: { [SYNC_FILE]: { content } },
  });
  cfg.gistId = gist.id;
  state.sync = cfg;
  saveSyncCfg(cfg);
}

async function boot(){
  state.sync = loadSyncCfg();
  // Fallback: adopt a sync code carried in the URL hash (#VSYNC1.…).
  // Mobile Notion apps often wipe embed localStorage between sessions;
  // the embed URL lives in the Notion page itself, so it survives.
  if(!state.sync){
    const hashCfg = parseSyncCode(decodeURIComponent(location.hash.slice(1)));
    if(hashCfg){ state.sync = hashCfg; saveSyncCfg(hashCfg); }
  }
  try{
    const existing = await window.storage.get(DATA_KEY, false);
    if(existing && existing.value){
      const parsed = JSON.parse(existing.value);
      state.vault = { entries: parsed.entries || [] };
    }
  } catch(e){ /* corrupted or blocked storage — start empty */ }
  render();
  if(state.sync){
    try{ await pullFromGist(); state.syncStatus = 'ok'; }
    catch(e){ state.syncStatus = 'error'; }
    render();
  }
}

async function persistVault(){
  await window.storage.set(DATA_KEY, JSON.stringify(state.vault), false);
  if(state.sync){
    try{ await pushToGist(); state.syncStatus = 'ok'; }
    catch(e){ state.syncStatus = 'error'; showToast('Sync failed — saved on this device only'); }
  }
}

/* ---------------- Main UI ---------------- */
function groupBy(entries){
  const map = {};
  entries.forEach(e=>{
    if(!map[e.category]) map[e.category] = [];
    map[e.category].push(e);
  });
  return map;
}

function mainScreen(){
  const entries = state.vault.entries;
  const groups = groupBy(entries);
  const catNames = Object.keys(groups);

  let body;
  if(entries.length === 0){
    body = `<div class="empty"><h2>Vault is empty</h2><p>Add your first account to get started.</p></div>`;
  } else {
    body = catNames.map(cat => renderGroup(cat, groups[cat])).join('');
  }

  return `
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div><h1>Account Vault${SPACE ? ' · ' + escapeHtml(SPACE) : ''}</h1><span>${entries.length} account${entries.length!==1?'s':''}</span></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="syncBtn">${state.sync ? `<span class="sync-dot ${state.syncStatus==='error'?'bad':'ok'}"></span>Sync` : 'Sync'}</button>
      <button class="icon-btn primary" id="addBtn">+ New account</button>
    </div>
  </div>
  <div class="content">${body}</div>
  ${state.openModal ? renderModal() : ''}
  ${state.openSync ? renderSyncModal() : ''}
  `;
}

function renderSyncModal(){
  const cfg = state.sync;
  let body;
  if(!cfg){
    body = `
      <p class="sync-p">Sync your accounts across devices through a private GitHub Gist. Data is encrypted before it leaves this browser.</p>
      <p class="sync-p"><b>First device:</b> paste a GitHub token. Create one at <b>github.com/settings/tokens</b> → Generate new token (classic) → tick only <b>gist</b>.</p>
      <p class="sync-p"><b>Other devices:</b> paste the sync code shown after connecting.</p>
      <div class="field"><label>GitHub token or sync code</label><input type="password" id="syncInput" placeholder="ghp_… or VSYNC1.…" autocomplete="off"></div>
      <div class="err">${state.syncError}</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="closeSync">Cancel</button>
        <button class="btn btn-primary" id="connectSyncBtn"${state.syncBusy?' disabled':''}>${state.syncBusy?'Connecting…':'Connect'}</button>
      </div>`;
  } else {
    body = `
      <p class="sync-p">Status: ${state.syncStatus==='error' ? '<span style="color:var(--danger)">last sync failed — check your connection or token</span>' : '<span style="color:var(--teal)">connected</span>'} · syncs when you open the widget and on every save.</p>
      <p class="sync-p">Paste this sync code once in the widget on each of your other devices. <b>Keep it secret</b> — anyone with it can read your accounts.</p>
      <div class="field"><textarea id="syncCodeBox" readonly rows="4">${syncCode(cfg)}</textarea></div>
      <p class="sync-p"><b>On phones</b>, embed this URL instead — it carries the sync code, so the app never asks again even if it clears its storage:</p>
      <div class="field"><textarea id="embedUrlBox" readonly rows="4">${location.origin + location.pathname + location.search + '#' + syncCode(cfg)}</textarea></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="disconnectSyncBtn">Disconnect</button>
        <button class="btn btn-ghost" id="copySyncBtn">Copy code</button>
        <button class="btn btn-ghost" id="copyEmbedBtn">Copy URL</button>
        <button class="btn btn-primary" id="closeSync">Done</button>
      </div>`;
  }
  return `<div class="overlay" id="syncOverlay"><div class="modal"><h3>Device sync</h3>${body}</div></div>`;
}

function renderGroup(cat, items){
  return `
  <div class="group">
    <div class="group-head">
      <span class="ring"></span>
      <h2>${escapeHtml(cat)}</h2>
      <span class="count">${items.length}</span>
    </div>
    <div class="grid">
      ${items.map(renderCard).join('')}
    </div>
  </div>`;
}

function renderCard(entry){
  const color = COLORS[entry.colorIdx % COLORS.length];
  const revealed = !!state.revealed[entry.id];
  const pwDisplay = revealed ? escapeHtml(entry.password) : '••••••••••';
  return `
  <div class="card">
    <div class="card-head">
      <div class="card-icon" style="background:${color.bg}; color:${color.fg};">${renderIcon(entry.icon)}</div>
      <div class="card-title">${escapeHtml(entry.service)}</div>
      <div class="fab-menu">
        <div class="card-menu" data-menu="${entry.id}">⋯</div>
        ${state.openMenuId === entry.id ? `
          <div class="dropdown">
            <div data-edit="${entry.id}">Edit</div>
            <div class="danger" data-del="${entry.id}">Delete</div>
          </div>` : ''}
      </div>
    </div>
    <div class="card-row">
      <span class="val">${escapeHtml(entry.username || '—')}</span>
      <span class="acts"><button class="mini-btn" data-copy="${entry.id}:user" title="Copy username">⧉</button></span>
    </div>
    <div class="card-row">
      <span class="val">${pwDisplay}</span>
      <span class="acts">
        <button class="mini-btn" data-reveal="${entry.id}" title="Show/hide">${revealed ? '🙈' : '👁'}</button>
        <button class="mini-btn" data-copy="${entry.id}:pass" title="Copy password">⧉</button>
      </span>
    </div>
    ${entry.tag ? `<span class="tag" style="background:${color.bg}; color:${color.fg};">${escapeHtml(entry.tag)}</span>` : ''}
  </div>`;
}

function renderModal(){
  const m = state.openModal;
  const e = m.entry;
  return `
  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>${m.mode === 'add' ? 'New account' : 'Edit account'}</h3>
      <div class="field"><label>Category / board</label><input type="text" id="f_category" list="catlist" value="${escapeHtml(e.category)}" placeholder="e.g. Social Media"></div>
      <datalist id="catlist">${Object.keys(groupBy(state.vault.entries)).map(c=>`<option value="${escapeHtml(c)}">`).join('')}</datalist>
      <div class="field"><label>Service name</label><input type="text" id="f_service" value="${escapeHtml(e.service)}" placeholder="e.g. Instagram"></div>
      <div class="row-2">
        <div class="field"><label>Username / email</label><input type="text" id="f_username" value="${escapeHtml(e.username)}"></div>
        <div class="field"><label>Tag (optional)</label><input type="text" id="f_tag" value="${escapeHtml(e.tag||'')}" placeholder="e.g. Work"></div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="pw-input-wrap">
          <input type="text" id="f_password" value="${escapeHtml(e.password)}" placeholder="Enter or generate">
          <div class="pw-acts">
            <button class="mini-btn" id="genPwBtn" title="Generate strong password">🎲</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Icon</label>
        <div class="color-picker icon-list">${
          BRANDS.map(b=>`<span class="mini-btn ${e.icon==='d:'+b.domain?'icon-selected':''}" data-icon="d:${b.domain}" title="${escapeHtml(b.name)}">${renderIcon('d:'+b.domain)}</span>`).join('')
        }${
          ICONS.map(ic=>`<span class="mini-btn ${e.icon===ic?'icon-selected':''}" data-icon="${ic}" style="font-size:16px;">${ic}</span>`).join('')
        }</div>
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-picker">${COLORS.map((c,i)=>`<span class="color-dot ${e.colorIdx===i?'active':''}" data-color="${i}" style="background:${c.fg}"></span>`).join('')}</div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelModal">Cancel</button>
        <button class="btn btn-primary" id="saveModal">Save</button>
      </div>
    </div>
  </div>`;
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function genPassword(len=16){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*';
  const arr = crypto.getRandomValues(new Uint32Array(len));
  return Array.from(arr, n => chars[n % chars.length]).join('');
}

async function copyText(val){
  try{
    await navigator.clipboard.writeText(val);
    return true;
  }catch(e){
    // embed iframes (e.g. Notion) often block the async clipboard API — fall back
    try{
      const ta = document.createElement('textarea');
      ta.value = val;
      ta.setAttribute('readonly','');
      ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      const ok = document.execCommand('copy');
      ta.remove();
      return ok;
    }catch(e2){ return false; }
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1400);
}

function bindMainEvents(){
  const syncBtn = document.getElementById('syncBtn');
  if(syncBtn) syncBtn.onclick = ()=>{ state.openSync = true; state.syncError = ''; render(); };

  if(state.openSync){
    const syncOverlay = document.getElementById('syncOverlay');
    syncOverlay.onclick = (ev)=>{ if(ev.target.id === 'syncOverlay'){ state.openSync = false; render(); } };
    document.getElementById('closeSync').onclick = ()=>{ state.openSync = false; render(); };
    const connectBtn = document.getElementById('connectSyncBtn');
    if(connectBtn) connectBtn.onclick = async ()=>{
      const input = document.getElementById('syncInput').value.trim();
      if(!input){ state.syncError = 'Paste a token or sync code first.'; render(); return; }
      state.syncBusy = true; state.syncError = ''; render();
      try{
        await connectSync(input);
        state.syncBusy = false; state.syncStatus = 'ok';
        render(); showToast('Sync connected');
      }catch(e){
        state.syncBusy = false; state.sync = null; localStorage.removeItem(SYNC_KEY);
        state.syncError = 'Could not connect — check the token or code and try again.';
        render();
      }
    };
    const copyBtn = document.getElementById('copySyncBtn');
    if(copyBtn) copyBtn.onclick = async ()=>{ showToast(await copyText(syncCode(state.sync)) ? 'Sync code copied' : 'Copy blocked — select the code and copy manually'); };
    const copyEmbedBtn = document.getElementById('copyEmbedBtn');
    if(copyEmbedBtn) copyEmbedBtn.onclick = async ()=>{ showToast(await copyText(document.getElementById('embedUrlBox').value) ? 'Embed URL copied' : 'Copy blocked — select the URL and copy manually'); };
    const discBtn = document.getElementById('disconnectSyncBtn');
    if(discBtn) discBtn.onclick = ()=>{
      localStorage.removeItem(SYNC_KEY);
      state.sync = null; state.syncStatus = null;
      render(); showToast('Sync disconnected on this device');
    };
  }

  const addBtn = document.getElementById('addBtn');
  if(addBtn) addBtn.onclick = ()=>{
    state.openModal = { mode:'add', entry:{ id:null, category: Object.keys(groupBy(state.vault.entries))[0] || 'Accounts', service:'', username:'', password: genPassword(), tag:'', icon: ICONS[0], colorIdx: 0 } };
    render();
  };

  document.querySelectorAll('[data-menu]').forEach(el=>{
    el.onclick = (ev)=>{ ev.stopPropagation(); const id = el.getAttribute('data-menu'); state.openMenuId = state.openMenuId === id ? null : id; render(); };
  });
  document.querySelectorAll('[data-edit]').forEach(el=>{
    el.onclick = ()=>{ const id = el.getAttribute('data-edit'); const entry = state.vault.entries.find(x=>x.id===id); state.openMenuId = null; state.openModal = { mode:'edit', entry: {...entry} }; render(); };
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.getAttribute('data-del');
      state.vault.entries = state.vault.entries.filter(x=>x.id!==id);
      state.openMenuId = null;
      await persistVault();
      render();
      showToast('Deleted');
    };
  });
  document.querySelectorAll('[data-reveal]').forEach(el=>{
    el.onclick = ()=>{ const id = el.getAttribute('data-reveal'); state.revealed[id] = !state.revealed[id]; render(); };
  });
  document.querySelectorAll('[data-copy]').forEach(el=>{
    el.onclick = ()=>{
      const [id, field] = el.getAttribute('data-copy').split(':');
      const entry = state.vault.entries.find(x=>x.id===id);
      const val = field === 'user' ? entry.username : entry.password;
      copyText(val).then(ok => showToast(ok ? (field==='user' ? 'Username copied' : 'Password copied') : 'Copy blocked by this app'));
    };
  });

  if(state.openModal){
    // keep typed values across re-renders triggered by icon/color selection
    const syncModalFields = ()=>{
      const e = state.openModal.entry;
      e.category = document.getElementById('f_category').value;
      e.service = document.getElementById('f_service').value;
      e.username = document.getElementById('f_username').value;
      e.password = document.getElementById('f_password').value;
      e.tag = document.getElementById('f_tag').value;
    };
    const overlay = document.getElementById('overlay');
    overlay.onclick = (ev)=>{ if(ev.target.id === 'overlay'){ state.openModal = null; render(); } };
    document.getElementById('cancelModal').onclick = ()=>{ state.openModal = null; render(); };
    document.getElementById('genPwBtn').onclick = ()=>{ document.getElementById('f_password').value = genPassword(); };
    document.querySelectorAll('[data-icon]').forEach(el=>{
      el.onclick = ()=>{ syncModalFields(); state.openModal.entry.icon = el.getAttribute('data-icon'); render(); };
    });
    document.querySelectorAll('[data-color]').forEach(el=>{
      el.onclick = ()=>{ syncModalFields(); state.openModal.entry.colorIdx = parseInt(el.getAttribute('data-color')); render(); };
    });
    document.getElementById('saveModal').onclick = async ()=>{
      const m = state.openModal;
      const category = document.getElementById('f_category').value.trim() || 'Accounts';
      const service = document.getElementById('f_service').value.trim();
      const username = document.getElementById('f_username').value.trim();
      const password = document.getElementById('f_password').value;
      const tag = document.getElementById('f_tag').value.trim();
      if(!service){ showToast('Service name is required'); return; }
      if(m.mode === 'add'){
        state.vault.entries.push({
          id: 'e_' + Date.now() + '_' + Math.floor(Math.random()*1000),
          category, service, username, password, tag,
          icon: m.entry.icon, colorIdx: m.entry.colorIdx
        });
      } else {
        const idx = state.vault.entries.findIndex(x=>x.id===m.entry.id);
        state.vault.entries[idx] = { ...state.vault.entries[idx], category, service, username, password, tag, icon: m.entry.icon, colorIdx: m.entry.colorIdx };
      }
      state.openModal = null;
      await persistVault();
      render();
      showToast('Saved');
    };
  }

  document.addEventListener('click', (ev)=>{
    if(state.openMenuId && !ev.target.closest('.fab-menu')){ state.openMenuId = null; render(); }
  }, { once:true });
}

boot();
</script>
</body>
</html>
