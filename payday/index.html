<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payday Countdown</title>
<style>
  :root{
    --gold:#F2C14E; --amber:#FFB454; --green:#4ADE80; --red:#FF5C57; --cyan:#57D9FF;
    --dim:#6B5E3E; --grid:#1F1A0D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#000; color:var(--gold);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
  }
  #scaler{ transform-origin:center center; flex-shrink:0; }
  .frame{
    width:430px; padding:22px 24px 20px;
    border:1px solid #3D330F; border-radius:10px;
    background:rgba(0,0,0,0.82);
    box-shadow:0 0 26px rgba(242,193,78,0.10), inset 0 0 40px rgba(242,193,78,0.04);
    position:relative;
  }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-3px);} 75%{transform:translateX(3px);} }
  .frame.rush{ animation:shake 0.35s linear infinite; }
  .titlebar{
    display:flex; align-items:center; gap:7px; margin-bottom:16px;
    color:var(--dim); font-size:11px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; background:#3D330F; }
  .dot.r{ background:#FF5C57aa; } .dot.y{ background:#FFB454aa; } .dot.g{ background:#4ADE80aa; }
  .titlebar span{ margin-left:auto; }
  .row{ display:flex; align-items:center; gap:18px; }
  .mascot{
    width:92px; height:92px; flex-shrink:0; border-radius:50%;
    background:#FFF7E2; display:flex; align-items:center; justify-content:center;
    border:1px solid #3D330F; box-shadow:0 0 18px rgba(242,193,78,0.18);
    font-size:44px; position:relative;
  }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes count{ 0%,100%{transform:rotate(-6deg) scale(1);} 50%{transform:rotate(6deg) scale(1.08);} }
  @keyframes rain{ 0%,100%{transform:scale(1) rotate(0deg);} 50%{transform:scale(1.18) rotate(-8deg);} }
  @keyframes droop{ 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg) translateY(4px);} }
  .mascot.idle{ animation:bob 2.6s ease-in-out infinite; }
  .mascot.counting{ animation:count 0.5s ease-in-out infinite; }
  .mascot.hype{ animation:rain 0.5s ease-in-out infinite; }
  .mascot.sad{ animation:droop 3s ease-in-out infinite; }
  .bill{
    position:absolute; font-size:16px; opacity:0; pointer-events:none;
  }
  @keyframes floatUp{
    0%{ transform:translateY(10px) rotate(0deg); opacity:0; }
    15%{ opacity:1; }
    100%{ transform:translateY(-70px) rotate(20deg); opacity:0; }
  }
  .mascot.hype .bill{ animation:floatUp 1.4s ease-out infinite; }
  .main{ flex:1; min-width:0; text-align:left; }
  .label{ font-size:11px; color:var(--dim); margin-bottom:4px; }
  .label::before{ content:'> '; }
  .timer{
    font-weight:700; font-size:clamp(30px,10vw,46px); line-height:1.05;
    font-variant-numeric:tabular-nums; color:var(--gold);
    text-shadow:0 0 14px rgba(242,193,78,0.45);
  }
  .timer.payday{ color:var(--green); text-shadow:0 0 16px rgba(74,222,128,0.5); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .timer.rush{ color:var(--red); text-shadow:0 0 16px rgba(255,92,87,0.55); animation:pulse 0.9s infinite; }
  .quip{ margin-top:6px; font-size:12px; color:var(--dim); min-height:17px; }
  .quip::after{ content:'█'; margin-left:3px; animation:pulse 1.1s steps(1) infinite; font-size:10px; }
  .asciibar{ margin-top:18px; font-size:13px; letter-spacing:1px; white-space:nowrap; overflow:hidden; }
  .asciibar .done{ color:var(--gold); }
  .asciibar .todo{ color:#241E0C; }
  .asciibar .pct{ color:var(--amber); margin-left:8px; font-size:12px; }
  .meta{ margin-top:12px; font-size:10.5px; color:var(--dim); }
  .meta::before{ content:'$ '; }
  .confetti-layer{ position:absolute; inset:0; overflow:hidden; pointer-events:none; border-radius:10px; }
  @keyframes fall{ 0%{ transform:translateY(-20px) rotate(0deg); opacity:1; } 100%{ transform:translateY(240px) rotate(360deg); opacity:0; } }
  .confetti-layer i{ position:absolute; top:-20px; font-size:14px; animation:fall linear infinite; }
</style>
</head>
<body>
<div id="scaler">
  <div class="frame" id="frame">
    <div class="confetti-layer" id="confetti" style="display:none"></div>
    <div class="titlebar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span>payday.sh</span>
    </div>
    <div class="row">
      <div class="mascot idle" id="mascot">
        <span id="mascotFace">😩</span>
      </div>
      <div class="main">
        <div class="label" id="label">time_until_payday</div>
        <div class="timer" id="timer">--:--:--</div>
        <div class="quip" id="quip"></div>
      </div>
    </div>
    <div class="asciibar" id="asciibar"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>
<script>
/* Zero external requests — system fonts, emoji mascot, no images.
   URL config: ?day=27 which day of the month payday lands on.
   ?now=YYYY-MM-DD for testing (overrides today's date). */
const q = new URLSearchParams(location.search);
const PAY_DAY = parseInt(q.get('day') ?? '27');

const QUIPS = {
  far:   ["Still weeks of instant noodles ahead.", "Bank balance: emotional support only.", "Manifesting payday from here.", "Rent already ate this month's soul."],
  mid:   ["Halfway to rich (relatively).", "Banking app still says 'not yet'.", "Started a countdown for this. That's how bad it is.", "Coffee budget: strictly instant only."],
  close: ["Nearly there — hold the line.", "Already mentally spent it.", "Refresh the banking app one more time.", "So close you can taste the payday makan."],
  final: ["Tomorrow. TOMORROW.", "Sleep with one eye on your phone.", "This is basically payday eve.", "Banking app refresh count: too many."],
  payday:["💰 IT'S IN! 💰", "Rich for approximately 24 hours.", "Go treat yourself. Responsibly. Kind of.", "Briefly a functional adult."],
};
const MASCOT = { far:'😩', mid:'🧾', close:'🙏', final:'👀', payday:'🤑' };
let quipPool = [], quipIdx = 0, lastPhase = '';

function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const d = Math.floor(s/86400);
  const h = String(Math.floor(s%86400/3600)).padStart(2,'0');
  const m = String(Math.floor(s%3600/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return d > 0 ? `${d}d ${h}:${m}:${sec}` : `${h}:${m}:${sec}`;
}

function nowSim(){
  const n = new Date();
  const sim = q.get('now');
  if(sim){
    const [y,mo,da] = sim.split('-').map(Number);
    n.setFullYear(y, mo-1, da);
  }
  return n;
}

function pickQuip(phase){
  if(phase !== lastPhase){
    lastPhase = phase;
    quipPool = QUIPS[phase];
    quipIdx = Math.floor(Math.random()*quipPool.length);
  }
  return quipPool[quipIdx];
}
function rotateQuip(){
  if(!quipPool.length) return null;
  quipIdx = (quipIdx+1) % quipPool.length;
  return quipPool[quipIdx];
}

function computeState(){
  const n = nowSim();
  const meta = n.toLocaleDateString('en-GB') + ' ' + n.toLocaleTimeString('en-GB');

  if(n.getDate() === PAY_DAY){
    return { mode:'payday', phase:'payday', label:'today is payday', timer:'💰💰💰', meta, pct:null, quip:pickQuip('payday') };
  }

  // find the next occurrence of PAY_DAY and the previous one, to build a cycle progress bar
  const target = new Date(n.getFullYear(), n.getMonth() + (n.getDate() > PAY_DAY ? 1 : 0), PAY_DAY, 0, 0, 0, 0);
  const prevTarget = new Date(target.getFullYear(), target.getMonth() - 1, PAY_DAY, 0, 0, 0, 0);
  const total = target - prevTarget;
  const done = n - prevTarget;
  const pct = Math.max(0, Math.min(100, done / total * 100));
  const daysLeft = (target - n) / 86400000;
  const phase = daysLeft > 20 ? 'far' : daysLeft > 10 ? 'mid' : daysLeft > 3 ? 'close' : 'final';

  return { mode:'countdown', phase, label:'time_until_payday', timer:fmt(target-n), meta, pct, quip:pickQuip(phase) };
}

function spawnBills(mascotEl){
  mascotEl.querySelectorAll('.bill').forEach(b=>b.remove());
  const bills = ['💵','💵','🪙'];
  bills.forEach((b,i)=>{
    const el = document.createElement('span');
    el.className = 'bill';
    el.textContent = b;
    el.style.left = (20 + i*25) + '%';
    el.style.animationDelay = (i*0.25) + 's';
    mascotEl.appendChild(el);
  });
}

function spawnConfetti(){
  const layer = document.getElementById('confetti');
  if(layer.childElementCount) return;
  const emojis = ['💰','💵','🪙','✨'];
  for(let i=0;i<18;i++){
    const el = document.createElement('i');
    el.textContent = emojis[i%emojis.length];
    el.style.left = (i*23)%100 + '%';
    el.style.animationDuration = (1.6+(i%5)*0.3).toFixed(2)+'s';
    el.style.animationDelay = ((i%9)*0.18).toFixed(2)+'s';
    layer.appendChild(el);
  }
}

function applyState(s){
  document.getElementById('label').textContent = s.label;
  document.getElementById('timer').textContent = s.timer;
  document.getElementById('quip').textContent = s.quip;
  document.getElementById('meta').textContent = s.meta;
  document.getElementById('mascotFace').textContent = MASCOT[s.phase] || '😩';

  const timer = document.getElementById('timer');
  const mascot = document.getElementById('mascot');
  const frame = document.getElementById('frame');
  const confetti = document.getElementById('confetti');

  timer.className = 'timer' + (s.mode==='payday' ? ' payday' : s.phase==='final' ? ' rush' : '');
  frame.className = 'frame' + (s.phase==='final' && s.mode!=='payday' ? ' rush' : '');
  mascot.className = 'mascot ' + (s.mode==='payday' ? 'hype' : s.phase==='final' ? 'counting' : s.phase==='far' ? 'sad' : 'idle');

  if(s.mode==='payday'){
    confetti.style.display = '';
    spawnConfetti();
    spawnBills(mascot);
  } else {
    confetti.style.display = 'none';
    confetti.innerHTML = '';
    mascot.querySelectorAll('.bill').forEach(b=>b.remove());
  }

  const bar = document.getElementById('asciibar');
  if(s.pct === null){ bar.style.display = 'none'; return; }
  bar.style.display = '';
  const BLOCKS = 26;
  const done = Math.round(s.pct / 100 * BLOCKS);
  bar.innerHTML = '[<span class="done">' + '█'.repeat(done) + '</span><span class="todo">' + '░'.repeat(BLOCKS - done) + '</span>]<span class="pct">' + s.pct.toFixed(1) + '%</span>';
}

function tick(){ applyState(computeState()); }
tick();
setInterval(tick, 1000);
setInterval(() => {
  const nq = rotateQuip();
  if(nq !== null) document.getElementById('quip').textContent = nq;
}, 15000);

function autoScale(){
  const el = document.getElementById('scaler');
  const vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
  const s = Math.min(vw / el.offsetWidth, vh / el.offsetHeight) * 0.95;
  el.style.transform = 'scale(' + s + ')';
}
addEventListener('resize', autoScale);
new ResizeObserver(autoScale).observe(document.documentElement);
setInterval(autoScale, 800);
autoScale();
</script>
</body>
</html>
