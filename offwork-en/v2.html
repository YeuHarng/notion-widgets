<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Off-Work Countdown · Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#3DF08C; --amber:#FFB454; --red:#FF5C57; --cyan:#57D9FF;
    --dim:#3E6B52; --grid:#0D1F15;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#000; color:var(--green);
    font-family:'JetBrains Mono',monospace;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
  }
  .frame{
    width:430px; flex-shrink:0; padding:22px 24px 20px;
    border:1px solid #1E4A32; border-radius:10px;
    background:rgba(0,0,0,0.82);
    box-shadow:0 0 26px rgba(61,240,140,0.09), inset 0 0 40px rgba(61,240,140,0.04);
    transform-origin:center center;
  }
  .titlebar{
    display:flex; align-items:center; gap:7px; margin-bottom:16px;
    color:var(--dim); font-size:11px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; background:#1E4A32; }
  .dot.r{ background:#FF5C57aa; } .dot.y{ background:#FFB454aa; } .dot.g{ background:#3DF08Caa; }
  .titlebar span{ margin-left:auto; }
  .row{ display:flex; align-items:center; gap:18px; }
  .cat{
    width:92px; height:92px; flex-shrink:0; border-radius:50%;
    background:#FFF7EA; display:flex; align-items:center; justify-content:center;
    border:1px solid #1E4A32; box-shadow:0 0 18px rgba(61,240,140,0.15);
  }
  .cat img{ width:70px; height:70px; object-fit:contain; }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .cat{ animation:bob 2.4s ease-in-out infinite; }
  .main{ flex:1; min-width:0; text-align:left; }
  .label{ font-size:11px; color:var(--dim); margin-bottom:4px; }
  .label::before{ content:'> '; }
  .timer{
    font-weight:700; font-size:clamp(34px,11vw,52px); line-height:1.05;
    font-variant-numeric:tabular-nums; color:var(--green);
    text-shadow:0 0 14px rgba(61,240,140,0.45);
  }
  .timer.free{ color:var(--cyan); text-shadow:0 0 14px rgba(87,217,255,0.45); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .timer.rush{ color:var(--red); text-shadow:0 0 16px rgba(255,92,87,0.55); animation:pulse 0.9s infinite; }
  .quip{ margin-top:6px; font-size:12px; color:var(--dim); min-height:17px; }
  .quip::after{ content:'█'; margin-left:3px; animation:pulse 1.1s steps(1) infinite; font-size:10px; }
  .asciibar{ margin-top:18px; font-size:13px; letter-spacing:1px; white-space:nowrap; overflow:hidden; }
  .asciibar .done{ color:var(--green); }
  .asciibar .todo{ color:#173324; }
  .asciibar .pct{ color:var(--amber); margin-left:8px; font-size:12px; }
  .meta{ margin-top:12px; font-size:10.5px; color:var(--dim); }
  .meta::before{ content:'$ '; }
</style>
</head>
<body>
<div class="frame" id="scaler">
  <div class="titlebar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span>offwork.sh</span>
  </div>
  <div class="row">
    <div class="cat"><img src="cat.gif" alt="cat"></div>
    <div class="main">
      <div class="label" id="label">time_until_freedom</div>
      <div class="timer" id="timer">--:--:--</div>
      <div class="quip" id="quip"></div>
    </div>
  </div>
  <div class="asciibar" id="asciibar"></div>
  <div class="meta" id="meta"></div>
</div>
<script src="shared.js?v=2"></script>
<script>
const BLOCKS = 26;
window.applyQuip = t => document.getElementById('quip').textContent = t;
window.applyState = s => {
  document.getElementById('label').textContent = s.label.toLowerCase().replace(/ /g,'_');
  document.getElementById('timer').textContent = s.timer;
  document.getElementById('quip').textContent = s.quip;
  document.getElementById('meta').textContent = s.meta;
  const timer = document.getElementById('timer');
  const free = s.mode !== 'work';
  timer.className = 'timer' + (free ? ' free' : s.phase === 'rush' ? ' rush' : '');
  const bar = document.getElementById('asciibar');
  if(s.pct === null){ bar.style.display = 'none'; return; }
  bar.style.display = '';
  const done = Math.round(s.pct / 100 * BLOCKS);
  bar.innerHTML = '[<span class="done">' + '█'.repeat(done) + '</span><span class="todo">' + '░'.repeat(BLOCKS - done) + '</span>]<span class="pct">' + s.pct.toFixed(1) + '%</span>';
};
startEngine();

/* Scale the whole card to fill the embed, like an image */
function autoScale(){
  const el = document.getElementById('scaler');
  const vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
  const s = Math.min(vw / el.offsetWidth, vh / el.offsetHeight) * 0.95;
  el.style.transform = 'scale(' + s + ')';
}
addEventListener('resize', autoScale);
new ResizeObserver(autoScale).observe(document.documentElement);
setInterval(autoScale, 800); /* fallback for webviews that fire no resize events */
autoScale();
setTimeout(autoScale, 300); /* re-measure after fonts load */
</script>
</body>
</html>
