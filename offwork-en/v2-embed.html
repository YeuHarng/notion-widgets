<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Off-Work Countdown</title>
<style>
  :root{
    --green:#3DF08C; --amber:#FFB454; --red:#FF5C57; --cyan:#57D9FF;
    --dim:#3E6B52; --grid:#0D1F15;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:#000; color:var(--green);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Courier New',monospace;
    display:flex; align-items:center; justify-content:center;
    -webkit-font-smoothing:antialiased; overflow:hidden;
    background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size:28px 28px;
  }
  .frame{
    width:430px; flex-shrink:0; padding:22px 24px 20px;
    border:1px solid #1E4A32; border-radius:10px;
    background:rgba(0,0,0,0.82);
    box-shadow:0 0 26px rgba(61,240,140,0.09), inset 0 0 40px rgba(61,240,140,0.04);
    transform-origin:center center;
  }
  .titlebar{
    display:flex; align-items:center; gap:7px; margin-bottom:16px;
    color:var(--dim); font-size:11px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; background:#1E4A32; }
  .dot.r{ background:#FF5C57aa; } .dot.y{ background:#FFB454aa; } .dot.g{ background:#3DF08Caa; }
  .titlebar span{ margin-left:auto; }
  .row{ display:flex; align-items:center; gap:18px; }
  .cat{
    width:92px; height:92px; flex-shrink:0; border-radius:50%;
    background:#FFF7EA; display:flex; align-items:center; justify-content:center;
    border:1px solid #1E4A32; box-shadow:0 0 18px rgba(61,240,140,0.15);
    font-size:44px;
  }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  @keyframes zoom{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }
  @keyframes droop{ 0%,100%{transform:rotate(-6deg);} 50%{transform:rotate(6deg) translateY(4px);} }
  .cat.calm{ animation:bob 2.4s ease-in-out infinite; }
  .cat.sleepy{ animation:droop 3s ease-in-out infinite; }
  .cat.hyper{ animation:zoom 0.6s ease-in-out infinite; }
  .main{ flex:1; min-width:0; text-align:left; }
  .label{ font-size:11px; color:var(--dim); margin-bottom:4px; }
  .label::before{ content:'> '; }
  .timer{
    font-weight:700; font-size:clamp(34px,11vw,52px); line-height:1.05;
    font-variant-numeric:tabular-nums; color:var(--green);
    text-shadow:0 0 14px rgba(61,240,140,0.45);
  }
  .timer.free{ color:var(--cyan); text-shadow:0 0 14px rgba(87,217,255,0.45); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .timer.rush{ color:var(--red); text-shadow:0 0 16px rgba(255,92,87,0.55); animation:pulse 0.9s infinite; }
  .quip{ margin-top:6px; font-size:12px; color:var(--dim); min-height:17px; }
  .quip::after{ content:'█'; margin-left:3px; animation:pulse 1.1s steps(1) infinite; font-size:10px; }
  .asciibar{ margin-top:18px; font-size:13px; letter-spacing:1px; white-space:nowrap; overflow:hidden; }
  .asciibar .done{ color:var(--green); }
  .asciibar .todo{ color:#173324; }
  .asciibar .pct{ color:var(--amber); margin-left:8px; font-size:12px; }
  .meta{ margin-top:12px; font-size:10.5px; color:var(--dim); }
  .meta::before{ content:'$ '; }
</style>
</head>
<body>
<div class="frame" id="scaler">
  <div class="titlebar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span>offwork.sh</span>
  </div>
  <div class="row">
    <div class="cat calm" id="cat">🐱</div>
    <div class="main">
      <div class="label" id="label">time_until_freedom</div>
      <div class="timer" id="timer">--:--:--</div>
      <div class="quip" id="quip"></div>
    </div>
  </div>
  <div class="asciibar" id="asciibar"></div>
  <div class="meta" id="meta"></div>
</div>
<script>
/* Everything below is inlined on purpose — this file has zero external
   requests (no fonts, no images, no scripts) so it works even when a
   corporate VPN/proxy blocks external hosting domains. Config via URL:
   ?start=9&end=18 work hours; ?now=HH:MM &day=0-6 for testing. */
const q = new URLSearchParams(location.search);
const START_H = parseFloat(q.get('start') ?? '9');
const END_H = parseFloat(q.get('end') ?? '18');

const QUIPS = {
  early:   ["Coffee first. Everything else can wait.", "Fresh in, and already counting down?", "Pretend to read emails for a while.", "The chair is still warming up."],
  mid:     ["Strategic slacking in progress…", "Look busy — the boss might walk by.", "Refill your water. That's 5 minutes gone.", "Nod in meetings. Works every time."],
  half:    ["Halfway! …that's still SO long.", "Lunch was the only real meeting today.", "The afternoon is where hope goes to die."],
  slump:   ["The 3 PM wall. Stay strong.", "Your salary is cheering for you.", "Eyes open. Soul elsewhere.", "Do not fall asleep. Camera might be on."],
  rush:    ["Pack your spirit. Almost free.", "Do NOT accept new tasks now!", "Hand on mouse. Ready to sprint.", "Final stretch — act busy."],
  before:  ["Enjoy your last free moments.", "Not at work yet and already counting?", "Five more minutes of sleep is fine."],
  after:   ["RUN. Don't look back!", "Freedom tastes amazing.", "Clocked out. You win today."],
  weekend: ["It's the weekend. Why are you here?", "Close Notion. Go touch grass.", "Checking this on a weekend? Wow."],
};
const LABELS = { work:'time_until_freedom', before:'time_until_work', after:'free_for', weekend:'no_work_today' };
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MASCOT = {
  early:'☕', mid:'💻', half:'🍜', slump:'😴', rush:'🏃',
  before:'🛌', after:'🏃‍♂️', weekend:'🎉',
};
let quipPool = [], quipIdx = 0, lastPhase = '';
const BLOCKS = 26;

function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const h = String(Math.floor(s/3600)).padStart(2,'0');
  const m = String(Math.floor(s%3600/60)).padStart(2,'0');
  const sec = String(s%60).padStart(2,'0');
  return `${h}:${m}:${sec}`;
}

function nowSim(){
  const n = new Date();
  const sim = q.get('now');
  if(sim){ const [h,m] = sim.split(':').map(Number); n.setHours(h, m||0); }
  const simDay = q.get('day');
  if(simDay !== null){ n.setDate(n.getDate() + (parseInt(simDay) - n.getDay())); }
  return n;
}

function pickQuip(phase){
  if(phase !== lastPhase){
    lastPhase = phase;
    quipPool = QUIPS[phase];
    quipIdx = Math.floor(Math.random()*quipPool.length);
  }
  return quipPool[quipIdx];
}
function rotateQuip(){
  if(!quipPool.length) return null;
  quipIdx = (quipIdx+1) % quipPool.length;
  return quipPool[quipIdx];
}

function computeState(){
  const n = nowSim();
  const day = n.getDay();
  const start = new Date(n); start.setHours(Math.floor(START_H), (START_H%1)*60, 0, 0);
  const end = new Date(n); end.setHours(Math.floor(END_H), (END_H%1)*60, 0, 0);
  const meta = n.toLocaleTimeString('en-GB') + ' · ' + DAYS[day];

  if(day === 0 || day === 6) return { mode:'weekend', phase:'weekend', label:LABELS.weekend, timer:'🎉', meta, pct:null, quip:pickQuip('weekend') };
  if(n < start) return { mode:'before', phase:'before', label:LABELS.before, timer:fmt(start-n), meta, pct:null, quip:pickQuip('before') };
  if(n >= end) return { mode:'after', phase:'after', label:LABELS.after, timer:fmt(n-end), meta, pct:null, quip:pickQuip('after') };
  const pct = (n - start) / (end - start) * 100;
  const phase = pct < 15 ? 'early' : pct < 40 ? 'mid' : pct < 60 ? 'half' : pct < 85 ? 'slump' : 'rush';
  return { mode:'work', phase, label:LABELS.work, timer:fmt(end-n), meta, pct, quip:pickQuip(phase) };
}

function applyState(s){
  document.getElementById('label').textContent = s.label;
  document.getElementById('timer').textContent = s.timer;
  document.getElementById('quip').textContent = s.quip;
  document.getElementById('meta').textContent = s.meta;
  document.getElementById('cat').textContent = MASCOT[s.phase] || '🐱';
  const timer = document.getElementById('timer');
  const cat = document.getElementById('cat');
  const free = s.mode !== 'work';
  timer.className = 'timer' + (free ? ' free' : s.phase === 'rush' ? ' rush' : '');
  cat.className = 'cat ' + (s.phase === 'rush' || s.phase === 'after' || s.phase === 'weekend' ? 'hyper' : s.phase === 'slump' || s.phase === 'before' ? 'sleepy' : 'calm');
  const bar = document.getElementById('asciibar');
  if(s.pct === null){ bar.style.display = 'none'; return; }
  bar.style.display = '';
  const done = Math.round(s.pct / 100 * BLOCKS);
  bar.innerHTML = '[<span class="done">' + '█'.repeat(done) + '</span><span class="todo">' + '░'.repeat(BLOCKS - done) + '</span>]<span class="pct">' + s.pct.toFixed(1) + '%</span>';
}

function tick(){ applyState(computeState()); }
tick();
setInterval(tick, 1000);
setInterval(() => {
  const nq = rotateQuip();
  if(nq !== null) document.getElementById('quip').textContent = nq;
}, 15000);

function autoScale(){
  const el = document.getElementById('scaler');
  const vw = document.documentElement.clientWidth, vh = document.documentElement.clientHeight;
  const s = Math.min(vw / el.offsetWidth, vh / el.offsetHeight) * 0.95;
  el.style.transform = 'scale(' + s + ')';
}
addEventListener('resize', autoScale);
new ResizeObserver(autoScale).observe(document.documentElement);
setInterval(autoScale, 800);
autoScale();
</script>
</body>
</html>
